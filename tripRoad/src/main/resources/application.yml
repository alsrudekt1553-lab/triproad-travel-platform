server:
  port: 8587
# Oracle Connect
spring:
  application:
    name: tripRoad
    
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

  #Datasource Bean 생성
  datasource:
    driver-class-name: oracle.jdbc.driver.OracleDriver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  # View Resolver -->  X

  #Jpa Setting
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none


logging.level:
  org.hibernate.SQL: debug   # logger를 통해 하이버네이트 실행 SQL      
  
# Mybatis
mybatis:
  config-location: classpath:configuration.xml
  mapper-locations: classpath:mappers/**/*.xml # mappers 아래 모든 하위폴더의 mapper 허용

#upload Folder
com.oracle.tripRoad.upload.path: upload

# Mail (SMTP)
spring.mail:
  host: smtp.gmail.com
  port: 587
  username: ${MAIL_USERNAME}
  password: ${MAIL_PASSWORD}
  properties:
    mail.smtp.auth: true
    mail.smtp.starttls.enable: true

# KakaoPay
kakaopay:
  secret-key: ${KAKAOPAY_SECRET_KEY}
  cid: TC0ONETIME
  ready-url: https://open-api.kakaopay.com/online/v1/payment/ready
  approve-url: https://open-api.kakaopay.com/online/v1/payment/approve